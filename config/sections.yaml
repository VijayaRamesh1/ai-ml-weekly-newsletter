sections:
  - id: originals
    index: A
    title: Original Field Notes
    description: Hand-written essays, implementation notes, and opinions from the publication team.
    match:
      sources: ["Original"]
      domains: []
      keywords: ["field note", "essay", "runbook", "postmortem", "architecture", "opinion"]

  - id: pipelines
    index: B
    title: Data Pipeline Architecture
    description: Batch, streaming, orchestration, lineage, quality gates, contracts, and lakehouse operations.
    match:
      sources: ["AWS Big Data Blog", "Databricks Blog", "Confluent Blog", "Google Cloud Data Analytics Blog"]
      domains: ["aws.amazon.com", "databricks.com", "confluent.io", "cloud.google.com"]
      keywords: ["pipeline", "data pipeline", "streaming", "batch", "orchestration", "airflow", "dagster", "dbt", "spark", "flink", "kafka", "lakehouse", "lineage", "data contract", "data quality"]

  - id: aiops
    index: C
    title: AIOps & Observability
    description: Signals from logs, metrics, traces, incidents, SRE workflows, automated triage, and reliability tooling.
    match:
      sources: ["AWS Machine Learning Blog", "Google Cloud Blog", "Datadog Blog", "Elastic Blog", "Netflix TechBlog"]
      domains: ["aws.amazon.com", "cloud.google.com", "datadoghq.com", "elastic.co", "netflixtechblog.com"]
      keywords: ["aiops", "observability", "incident", "sre", "root cause", "alert", "log", "metric", "trace", "monitoring", "operations", "remediation", "triage"]

  - id: anomaly
    index: D
    title: ML Anomaly Detection
    description: Models, features, thresholds, drift, outliers, monitoring patterns, and detection evaluation.
    match:
      sources: ["arXiv Machine Learning Papers", "arXiv AI Papers", "arXiv Statistics ML Papers", "AWS Machine Learning Blog", "Google AI Blog"]
      domains: ["arxiv.org", "aws.amazon.com", "blog.google", "research.google"]
      keywords: ["anomaly detection", "outlier", "novelty detection", "change point", "drift", "time series", "forecast", "threshold", "unsupervised", "autoencoder", "isolation forest", "monitoring"]

  - id: research
    index: E
    title: Research to Production
    description: Research papers worth translating into production design decisions, with attention to constraints and failure modes.
    match:
      sources: ["arXiv Machine Learning Papers", "arXiv AI Papers", "arXiv Systems Papers", "Google DeepMind", "Google AI Blog"]
      domains: ["arxiv.org", "blog.google", "deepmind.google", "research.google"]
      keywords: ["paper", "benchmark", "dataset", "evaluation", "scaling", "model monitoring", "data quality", "reliability", "production", "systems", "mlops", "llmops"]

  - id: tools
    index: F
    title: Tools & Release Watch
    description: Notable open-source, cloud, and vendor updates that change how teams build or operate data and AI systems.
    match:
      sources: ["OpenAI News", "AWS Machine Learning Blog", "Databricks Blog", "Confluent Blog", "Google Cloud Blog"]
      domains: ["github.com", "openai.com", "aws.amazon.com", "databricks.com", "confluent.io", "cloud.google.com"]
      keywords: ["release", "launch", "general availability", "preview", "sdk", "connector", "integration", "open source", "agent", "workflow", "platform"]

order: [originals, pipelines, aiops, anomaly, research, tools]
